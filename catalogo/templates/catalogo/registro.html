{% extends 'catalogo/base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-4">

                <h2 class="fw-bold mb-3" style="color:#1b4332;">
                    Crear cuenta cliente
                </h2>

                <p>
                    Regístrate para solicitar servicios analíticos en Project Chimera.
                </p>

                <form method="post">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn chimera-btn-green w-100">
                        Registrarme
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
